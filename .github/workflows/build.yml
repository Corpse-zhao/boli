name: Build Deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/setup-theos@v1
        with:
          sdks: '16.5'  # 可按需修改 SDK 版本

      - name: Build package
        run: |
          make package FINALPACKAGE=1

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChatGlass-deb
          path: packages/*.deb
